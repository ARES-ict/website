<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline On Track LMS Pro+</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(180deg,#05010d,#020617);
    color:#e5e7eb;
}

/* CENTER */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* INPUTS */
input, select{
    padding:12px;
    margin:6px;
    border:none;
    border-radius:10px;
    width:260px;
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#38bdf8;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* PANELS */
#studentPanel,#teacherPanel,#registerPanel{
    display:none;
    padding:20px;
}

/* BOX */
.card{
    background:rgba(2,6,23,0.9);
    padding:15px;
    margin:10px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(56,189,248,0.2);
}

.qbox{
    border:1px solid #38bdf8;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

a{
    color:#38bdf8;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginPanel">
    <h1>LMS LOGIN</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="login()">Login</button>
    <button onclick="showRegister()">Register</button>

    <a onclick="resetPassword()">Forgot Password?</a>

    <p id="msg"></p>
</div>

<!-- REGISTER -->
<div class="container" id="registerPanel">
    <h1>Register Account</h1>

    <input id="r_email" placeholder="Email">
    <input id="r_password" type="password" placeholder="Password">

    <select id="r_role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="register()">Create Account</button>
    <button onclick="backLogin()">Back</button>
</div>

<!-- STUDENT -->
<div id="studentPanel">
    <h2>Student Portal</h2>

    <div id="quizArea"></div>
    <button onclick="submitQuiz()">Submit Quiz</button>
    <h3 id="result"></h3>
</div>

<!-- TEACHER -->
<div id="teacherPanel">
    <h2>Teacher Portal</h2>

    <div class="card">
        <h3>Create / Edit Quiz</h3>

        <input id="q" placeholder="Question">
        <input id="o1" placeholder="Option 1">
        <input id="o2" placeholder="Option 2">
        <input id="o3" placeholder="Option 3">
        <input id="o4" placeholder="Option 4">
        <input id="ans" placeholder="Correct Answer">

        <button onclick="addQ()">Add / Save Question</button>
    </div>

    <div class="card">
        <h3>Quiz Preview</h3>
        <div id="preview"></div>
    </div>
</div>

<script>

// 🔥 GOOGLE SHEETS BACKEND URL
function doPost(e){
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);

  sheet.appendRow([
    new Date(),
    data.email,
    data.role,
    data.score,
    data.total
  ]);

  return ContentService.createTextOutput("OK");
}

// ===============================
// DATABASE (SIMULATION + LMS STYLE)
// ===============================
let users = JSON.parse(localStorage.getItem("users")) || [];

let quiz = [];
let currentUser = {};

// ===============================
// REGISTER
// ===============================
function register(){
    let email = document.getElementById("r_email").value;
    let pass = document.getElementById("r_password").value;
    let role = document.getElementById("r_role").value;

    users.push({email, password:pass, role});
    localStorage.setItem("users", JSON.stringify(users));

    alert("Account Created!");
    backLogin();
}

// ===============================
// LOGIN
// ===============================
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    let role = document.getElementById("role").value;

    let found = users.find(u => u.email===email && u.password===pass && u.role===role);

    if(!found){
        document.getElementById("msg").innerText="Invalid login";
        return;
    }

    currentUser = found;

    document.getElementById("loginPanel").style.display="none";

    if(role==="student"){
        document.getElementById("studentPanel").style.display="block";
        loadQuiz();
    } else {
        document.getElementById("teacherPanel").style.display="block";
        renderPreview();
    }
}

// ===============================
// RESET PASSWORD
// ===============================
function resetPassword(){
    let email = prompt("Enter your email:");
    let user = users.find(u => u.email===email);

    if(!user){
        alert("Email not found");
        return;
    }

    let newPass = prompt("Enter new password:");
    user.password = newPass;

    localStorage.setItem("users", JSON.stringify(users));

    alert("Password reset successful");
}

// ===============================
// UI SWITCH
// ===============================
function showRegister(){
    document.getElementById("loginPanel").style.display="none";
    document.getElementById("registerPanel").style.display="flex";
}

function backLogin(){
    document.getElementById("registerPanel").style.display="none";
    document.getElementById("loginPanel").style.display="flex";
}

// ===============================
// TEACHER QUIZ
// ===============================
function addQ(){
    quiz.push({
        question:document.getElementById("q").value,
        options:[
            document.getElementById("o1").value,
            document.getElementById("o2").value,
            document.getElementById("o3").value,
            document.getElementById("o4").value
        ],
        answer:document.getElementById("ans").value
    });

    renderPreview();
}

function renderPreview(){
    let box=document.getElementById("preview");
    box.innerHTML="";

    quiz.forEach((q,i)=>{
        box.innerHTML+=`<div class="qbox"><b>${i+1}. ${q.question}</b></div>`;
    });
}

// ===============================
// STUDENT QUIZ
// ===============================
function loadQuiz(){
    let area=document.getElementById("quizArea");
    area.innerHTML="";

    quiz.forEach((q,i)=>{
        let html=`<div class="qbox"><b>${i+1}. ${q.question}</b><br>`;

        q.options.forEach(o=>{
            html+=`<label><input type="radio" name="q${i}" value="${o}">${o}</label><br>`;
        });

        html+=`</div>`;
        area.innerHTML+=html;
    });
}

// ===============================
// SUBMIT
// ===============================
function submitQuiz(){
    let score=0;

    quiz.forEach((q,i)=>{
        let selected=document.querySelector(`input[name="q${i}"]:checked`);
        if(selected && selected.value===q.answer){
            score++;
        }
    });

    document.getElementById("result").innerText=
        `${currentUser.email} scored ${score}/${quiz.length}`;

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            email:currentUser.email,
            role:currentUser.role,
            score:score,
            total:quiz.length
        })
    });
}

</script>

</body>
</html>
