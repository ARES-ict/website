<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline On Track LMS Pro</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(180deg,#05010d,#020617);
    color:#e5e7eb;
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input, select, textarea{
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    width:260px;
}

/* BUTTON */
button{
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:#38bdf8;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* PANELS */
#studentPanel,#teacherPanel{
    display:none;
    padding:20px;
}

.card{
    background:rgba(2,6,23,0.9);
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(56,189,248,0.2);
}

/* QUESTION BOX */
.qbox{
    border:1px solid #38bdf8;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h1>Offline On Track LMS Pro</h1>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">

    <select id="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
    </select>

    <button onclick="enter()">Enter</button>
</div>

<!-- STUDENT -->
<div id="studentPanel">
    <h2>Student Portal</h2>
    <div id="quizArea"></div>
    <button onclick="submitQuiz()">Submit</button>
    <h3 id="result"></h3>
</div>

<!-- TEACHER -->
<div id="teacherPanel">
    <h2>Teacher Portal (Quiz Builder)</h2>

    <div class="card">
        <h3>Create Quiz (Up to 100 Questions)</h3>

        <input id="q" placeholder="Question">

        <select id="type">
            <option>Multiple Choice</option>
            <option>Identification</option>
            <option>Enumeration</option>
            <option>Fill in the Blanks</option>
        </select>

        <input id="o1" placeholder="Option 1 (MC only)">
        <input id="o2" placeholder="Option 2">
        <input id="o3" placeholder="Option 3">
        <input id="o4" placeholder="Option 4">
        <input id="answer" placeholder="Correct Answer / Key">

        <button onclick="addQ()">Add Question</button>
        <button onclick="resetQuiz()">Reset Quiz</button>

        <p id="count">Questions: 0 / 100</p>
    </div>

    <div class="card">
        <h3>Preview Quiz</h3>
        <div id="preview"></div>
    </div>
</div>

<script>

// 🔥 GOOGLE SHEETS BACKEND
function doPost(e){
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);

  sheet.appendRow([
    new Date(),
    data.name,
    data.email,
    data.role,
    data.score,
    data.total
  ]);

  return ContentService.createTextOutput("OK");
}
// ===============================
// QUIZ STORAGE (MAX 100 QUESTIONS)
// ===============================
let quiz = [];

let user = {};

// ===============================
// LOGIN
// ===============================
function enter(){
    user.name = document.getElementById("name").value;
    user.email = document.getElementById("email").value;
    user.role = document.getElementById("role").value;

    if(!user.name || !user.email){
        alert("Fill all fields");
        return;
    }

    document.getElementById("login").style.display="none";

    if(user.role==="student"){
        document.getElementById("studentPanel").style.display="block";
        loadStudentQuiz();
    } else {
        document.getElementById("teacherPanel").style.display="block";
        renderPreview();
    }
}

// ===============================
// TEACHER - ADD QUESTION
// ===============================
function addQ(){
    if(quiz.length >= 100){
        alert("Max 100 questions reached");
        return;
    }

    let q = {
        question: document.getElementById("q").value,
        type: document.getElementById("type").value,
        options: [
            document.getElementById("o1").value,
            document.getElementById("o2").value,
            document.getElementById("o3").value,
            document.getElementById("o4").value
        ],
        answer: document.getElementById("answer").value
    };

    quiz.push(q);

    document.getElementById("count").innerText =
        "Questions: " + quiz.length + " / 100";

    renderPreview();
}

// ===============================
function resetQuiz(){
    quiz = [];
    renderPreview();
    document.getElementById("count").innerText = "Questions: 0 / 100";
}

// ===============================
// PREVIEW
// ===============================
function renderPreview(){
    let box = document.getElementById("preview");
    box.innerHTML="";

    quiz.forEach((q,i)=>{
        box.innerHTML += `
        <div class="qbox">
            <b>${i+1}. ${q.question}</b><br>
            <small>Type: ${q.type}</small>
        </div>`;
    });
}

// ===============================
// STUDENT LOAD
// ===============================
function loadStudentQuiz(){
    let area = document.getElementById("quizArea");
    area.innerHTML="";

    quiz.forEach((q,i)=>{
        let html = `<div class="qbox"><b>${i+1}. ${q.question}</b><br>`;

        if(q.type==="Multiple Choice"){
            q.options.forEach((o,j)=>{
                html += `<label>
                <input type="radio" name="q${i}" value="${o}">
                ${o}</label><br>`;
            });
        } else {
            html += `<input name="q${i}" placeholder="Answer"><br>`;
        }

        html += `</div>`;
        area.innerHTML += html;
    });
}

// ===============================
// SUBMIT + SCORE
// ===============================
function submitQuiz(){
    let score = 0;

    quiz.forEach((q,i)=>{
        let ans = document.querySelector(`[name="q${i}"]`);

        if(q.type==="Multiple Choice"){
            let selected = document.querySelector(`input[name="q${i}"]:checked`);
            if(selected && selected.value===q.answer){
                score++;
            }
        }
    });

    document.getElementById("result").innerText =
        `${user.name} Score: ${score}/${quiz.length}`;

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            name:user.name,
            email:user.email,
            role:user.role,
            score:score,
            total:quiz.length
        })
    });
}

</script>

</body>
</html>
