<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline On Track LMS Secure</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(180deg,#05010d,#020617);
    color:#e5e7eb;
}

/* LOGIN */
#login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

input, select{
    padding:12px;
    margin:6px;
    border-radius:10px;
    border:none;
    width:260px;
}

/* BUTTON */
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#38bdf8;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

/* PANELS */
#studentPanel,#teacherPanel{
    display:none;
    padding:20px;
}

.card{
    background:rgba(2,6,23,0.9);
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(56,189,248,0.2);
}

.qbox{
    border:1px solid #38bdf8;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h1>LMS LOGIN</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<!-- STUDENT -->
<div id="studentPanel">
    <h2>Student Portal</h2>
    <div id="quizArea"></div>
    <button onclick="submitQuiz()">Submit</button>
    <h3 id="result"></h3>
</div>

<!-- TEACHER -->
<div id="teacherPanel">
    <h2>Teacher Portal</h2>

    <div class="card">
        <h3>Create Question</h3>

        <input id="q" placeholder="Question">
        <input id="o1" placeholder="Option 1">
        <input id="o2" placeholder="Option 2">
        <input id="o3" placeholder="Option 3">
        <input id="o4" placeholder="Option 4">
        <input id="ans" placeholder="Correct Answer">

        <button onclick="addQ()">Add Question</button>
    </div>

    <div class="card">
        <h3>Preview</h3>
        <div id="preview"></div>
    </div>
</div>

<script>

// 🔥 GOOGLE SHEETS API URL (for scores + users validation optional)
function doPost(e){
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);

  sheet.appendRow([
    new Date(),
    data.email,
    data.role,
    data.score,
    data.total
  ]);

  return ContentService.createTextOutput("OK");
}

// ===============================
// USERS DATABASE (SIMULATED LMS LOGIN)
// ===============================
let users = [
    { email:"teacher@gmail.com", password:"1234", role:"teacher" },
    { email:"student@gmail.com", password:"1234", role:"student" }
];

let currentUser = {};
let quiz = [];

// ===============================
// LOGIN SYSTEM (EMAIL + PASSWORD)
// ===============================
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    let found = users.find(u => u.email === email && u.password === pass);

    if(!found){
        document.getElementById("msg").innerText = "Invalid login";
        return;
    }

    currentUser = found;

    document.getElementById("login").style.display="none";

    if(found.role==="student"){
        document.getElementById("studentPanel").style.display="block";
        loadQuiz();
    } else {
        document.getElementById("teacherPanel").style.display="block";
        renderPreview();
    }
}

// ===============================
// QUIZ SYSTEM
// ===============================
function addQ(){
    quiz.push({
        question:document.getElementById("q").value,
        options:[
            document.getElementById("o1").value,
            document.getElementById("o2").value,
            document.getElementById("o3").value,
            document.getElementById("o4").value
        ],
        answer:document.getElementById("ans").value
    });

    renderPreview();
}

function renderPreview(){
    let box = document.getElementById("preview");
    box.innerHTML="";

    quiz.forEach((q,i)=>{
        box.innerHTML += `
        <div class="qbox">
            <b>${i+1}. ${q.question}</b>
        </div>`;
    });
}

// ===============================
function loadQuiz(){
    let area = document.getElementById("quizArea");
    area.innerHTML="";

    quiz.forEach((q,i)=>{
        let html = `<div class="qbox"><b>${i+1}. ${q.question}</b><br>`;

        q.options.forEach(o=>{
            html += `
            <label>
                <input type="radio" name="q${i}" value="${o}">
                ${o}
            </label><br>`;
        });

        html += `</div>`;
        area.innerHTML += html;
    });
}

// ===============================
function submitQuiz(){
    let score = 0;

    quiz.forEach((q,i)=>{
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if(selected && selected.value === q.answer){
            score++;
        }
    });

    document.getElementById("result").innerText =
        `${currentUser.email} scored ${score}/${quiz.length}`;

    fetch(SCRIPT_URL,{
        method:"POST",
        body:JSON.stringify({
            email:currentUser.email,
            role:currentUser.role,
            score:score,
            total:quiz.length
        })
    });
}

</script>

</body>
</html>
